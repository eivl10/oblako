<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/cloud_favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Данино облачко</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Bad+Script&family=Bebas+Neue&family=Caveat:wght@600&family=Comfortaa:wght@600&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Forum&family=Kelly+Slab&family=Lobster&family=Marck+Script&family=Montserrat:wght@600&family=Neucha&family=Oswald:wght@600&family=Pacifico&family=Playfair+Display:ital,wght@0,600;1,600&family=Press+Start+2P&family=Rubik:wght@600&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="aurora-bg"></div>
    <div id="app">
      <!-- Всплывающая подсказка по центру сверху -->
      <div id="hint">Слова можно подёргать</div>
      
      <!-- Элемент самого слова, которое мы вытягиваем -->
      <div id="dragged-word" class="hidden"></div>
      
      <div id="canvas-container">
        <!-- Увеличим разрешение canvas для Retina-дисплеев, а в CSS ужмем -->
        <canvas id="myCanvas" width="900" height="900">
          <p>Ваш браузер не поддерживает Canvas.</p>
        </canvas>
      </div>
      <div id="tags" style="display: none;">
        <ul>
          <!-- Тэги будут сгенерированы через JS -->
        </ul>
      </div>

      <!-- Скрытая панель управления (Ctrl + L) -->
      <div id="settings-panel" class="hidden">
        <div class="panel-header">
          <span>⚙ Настройки облака (Ctrl + L)</span>
          <button id="close-panel-btn">✕</button>
        </div>
        
        <div class="panel-row">
          <label for="font-select">Шрифт (50 вариантов):</label>
          <select id="font-select">
            <option value="Bebas Neue">Bebas Neue (гротеск)</option>
            <option value="Montserrat">Montserrat</option>
            <option value="Playfair Display">Playfair Display (засечки)</option>
            <option value="Comfortaa">Comfortaa (округлый)</option>
            <option value="Caveat">Caveat (рукописный)</option>
            <option value="Cormorant Garamond">Cormorant Garamond</option>
            <option value="Russo One">Russo One (плакатный)</option>
            <option value="Marck Script">Marck Script (каллиграфия)</option>
            <option value="Pacifico">Pacifico</option>
            <option value="Amatic SC">Amatic SC</option>
            <option value="Rubik">Rubik</option>
            <option value="Oswald">Oswald</option>
            <option value="Lobster">Lobster</option>
            <option value="Kelly Slab">Kelly Slab</option>
            <option value="Forum">Forum</option>
            <option value="Neucha">Neucha</option>
            <option value="Bad Script">Bad Script</option>
            <option value="Press Start 2P">Press Start 2P (пиксельный)</option>
            <option value="Fira Sans">Fira Sans</option>
            <option value="PT Sans">PT Sans</option>
            <option value="Roboto">Roboto</option>
            <option value="Open Sans">Open Sans</option>
            <option value="Lora">Lora</option>
            <option value="Merriweather">Merriweather</option>
            <option value="Noto Sans">Noto Sans</option>
            <option value="Ubuntu">Ubuntu</option>
            <option value="Raleway">Raleway</option>
            <option value="Cuprum">Cuprum</option>
            <option value="Philosopher">Philosopher</option>
            <option value="Tenor Sans">Tenor Sans</option>
            <option value="El Messiri">El Messiri</option>
            <option value="Yanone Kaffeesatz">Yanone Kaffeesatz</option>
            <option value="Alegreya">Alegreya</option>
            <option value="Alice">Alice</option>
            <option value="Alumni Sans">Alumni Sans</option>
            <option value="Underdog">Underdog</option>
            <option value="Anonymous Pro">Anonymous Pro (моноширинный)</option>
            <option value="Oranienbaum">Oranienbaum</option>
            <option value="Bellota Text">Bellota Text</option>
            <option value="Jura">Jura (техно)</option>
            <option value="Podkova">Podkova</option>
            <option value="Kurale">Kurale</option>
            <option value="Yeseva One">Yeseva One</option>
            <option value="Ruslan Display">Ruslan Display (древнерусский)</option>
            <option value="Seymour One">Seymour One</option>
            <option value="Cormorant Infant">Cormorant Infant</option>
            <option value="Didact Gothic">Didact Gothic</option>
            <option value="IBM Plex Sans">IBM Plex Sans</option>
            <option value="Pangolin">Pangolin</option>
            <option value="Stalinist One">Stalinist One</option>
          </select>
        </div>

        <div class="panel-row">
          <label>Форматирование:</label>
          <div class="checkbox-group">
            <label><input type="checkbox" id="chk-italic"> Курсив</label>
            <label><input type="checkbox" id="chk-bold"> Жирный</label>
            <label><input type="checkbox" id="chk-uppercase"> Все заглавные</label>
          </div>
        </div>

        <div class="panel-row">
          <label for="size-slider">Размер слов: <span id="size-val">1.0x</span></label>
          <input type="range" id="size-slider" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <div class="panel-row">
          <label for="shadow-slider">Размытие тени: <span id="shadow-val">1px</span></label>
          <input type="range" id="shadow-slider" min="0" max="15" step="1" value="1">
        </div>

        <div class="panel-row">
          <label for="color-picker">Цвет слов:</label>
          <input type="color" id="color-picker" value="#4B8BCC">
        </div>

        <div class="panel-actions">
          <button id="save-btn" class="btn-primary">Сохранить</button>
          <button id="reset-btn" class="btn-secondary">Сбросить</button>
        </div>
      </div>
      </div>
    </div>
    <script src="/tagcanvas.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
