<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/cloud_favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Данино облачко</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya&family=Alice&family=Alumni+Sans&family=Amatic+SC:wght@700&family=Anonymous+Pro&family=Bad+Script&family=Bebas+Neue&family=Bellota+Text&family=Caveat:wght@600&family=Comfortaa:wght@600&family=Cormorant+Garamond:wght@600&family=Cormorant+Infant&family=Cuprum&family=Didact+Gothic&family=El+Messiri&family=Fira+Sans&family=Forum&family=IBM+Plex+Sans&family=Jura&family=Kelly+Slab&family=Kurale&family=Lobster&family=Lora&family=Marck+Script&family=Merriweather&family=Montserrat:wght@600&family=Neucha&family=Noto+Sans&family=Oranienbaum&family=Oswald:wght@600&family=Pacifico&family=Pangolin&family=Philosopher&family=Playfair+Display:ital,wght@0,600;1,600&family=Podkova&family=Press+Start+2P&family=Pt+Sans&family=Raleway&family=Roboto&family=Rubik:wght@600&family=Ruslan+Display&family=Russo+One&family=Seymour+One&family=Stalinist+One&family=Tenor+Sans&family=Ubuntu&family=Underdog&family=Yanone+Kaffeesatz&family=Yeseva+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="aurora-bg"></div>
    <div id="app">
      <!-- Всплывающая подсказка по центру сверху -->
      <div id="hint">Слова можно подёргать</div>
      
      <!-- Элемент самого слова, которое мы вытягиваем -->
      <div id="dragged-word" class="hidden"></div>
      
      <div id="canvas-container">
        <!-- Увеличим разрешение canvas для Retina-дисплеев, а в CSS ужмем -->
        <canvas id="myCanvas" width="900" height="900">
          <p>Ваш браузер не поддерживает Canvas.</p>
        </canvas>
      </div>
      <div id="tags" style="display: none;">
        <ul>
          <!-- Тэги будут сгенерированы через JS -->
        </ul>
      </div>

      <!-- Скрытая панель управления (Ctrl + L) -->
      <div id="settings-panel" class="hidden">
        <div class="panel-header">
          <span>⚙ Настройки облака (Ctrl + L)</span>
          <button id="close-panel-btn">✕</button>
        </div>
        
        <div class="panel-row">
          <label for="font-select">Шрифт (50 вариантов):</label>
          <select id="font-select">
            <option value="Bebas Neue" style="font-family: 'Bebas Neue', sans-serif;">Bebas Neue (гротеск)</option>
            <option value="Montserrat" style="font-family: 'Montserrat', sans-serif;">Montserrat</option>
            <option value="Playfair Display" style="font-family: 'Playfair Display', serif;">Playfair Display (засечки)</option>
            <option value="Comfortaa" style="font-family: 'Comfortaa', cursive;">Comfortaa (округлый)</option>
            <option value="Caveat" style="font-family: 'Caveat', cursive;">Caveat (рукописный)</option>
            <option value="Cormorant Garamond" style="font-family: 'Cormorant Garamond', serif;">Cormorant Garamond</option>
            <option value="Russo One" style="font-family: 'Russo One', sans-serif;">Russo One (плакатный)</option>
            <option value="Marck Script" style="font-family: 'Marck Script', cursive;">Marck Script (каллиграфия)</option>
            <option value="Pacifico" style="font-family: 'Pacifico', cursive;">Pacifico</option>
            <option value="Amatic SC" style="font-family: 'Amatic SC', cursive;">Amatic SC</option>
            <option value="Rubik" style="font-family: 'Rubik', sans-serif;">Rubik</option>
            <option value="Oswald" style="font-family: 'Oswald', sans-serif;">Oswald</option>
            <option value="Lobster" style="font-family: 'Lobster', cursive;">Lobster</option>
            <option value="Kelly Slab" style="font-family: 'Kelly Slab', cursive;">Kelly Slab</option>
            <option value="Forum" style="font-family: 'Forum', serif;">Forum</option>
            <option value="Neucha" style="font-family: 'Neucha', cursive;">Neucha</option>
            <option value="Bad Script" style="font-family: 'Bad Script', cursive;">Bad Script</option>
            <option value="Press Start 2P" style="font-family: 'Press Start 2P', cursive;">Press Start 2P (пиксельный)</option>
            <option value="Fira Sans" style="font-family: 'Fira Sans', sans-serif;">Fira Sans</option>
            <option value="PT Sans" style="font-family: 'PT Sans', sans-serif;">PT Sans</option>
            <option value="Roboto" style="font-family: 'Roboto', sans-serif;">Roboto</option>
            <option value="Open Sans" style="font-family: 'Open Sans', sans-serif;">Open Sans</option>
            <option value="Lora" style="font-family: 'Lora', serif;">Lora</option>
            <option value="Merriweather" style="font-family: 'Merriweather', serif;">Merriweather</option>
            <option value="Noto Sans" style="font-family: 'Noto Sans', sans-serif;">Noto Sans</option>
            <option value="Ubuntu" style="font-family: 'Ubuntu', sans-serif;">Ubuntu</option>
            <option value="Raleway" style="font-family: 'Raleway', sans-serif;">Raleway</option>
            <option value="Cuprum" style="font-family: 'Cuprum', sans-serif;">Cuprum</option>
            <option value="Philosopher" style="font-family: 'Philosopher', sans-serif;">Philosopher</option>
            <option value="Tenor Sans" style="font-family: 'Tenor Sans', sans-serif;">Tenor Sans</option>
            <option value="El Messiri" style="font-family: 'El Messiri', sans-serif;">El Messiri</option>
            <option value="Yanone Kaffeesatz" style="font-family: 'Yanone Kaffeesatz', sans-serif;">Yanone Kaffeesatz</option>
            <option value="Alegreya" style="font-family: 'Alegreya', serif;">Alegreya</option>
            <option value="Alice" style="font-family: 'Alice', serif;">Alice</option>
            <option value="Alumni Sans" style="font-family: 'Alumni Sans', sans-serif;">Alumni Sans</option>
            <option value="Underdog" style="font-family: 'Underdog', cursive;">Underdog</option>
            <option value="Anonymous Pro" style="font-family: 'Anonymous Pro', monospace;">Anonymous Pro (моноширинный)</option>
            <option value="Oranienbaum" style="font-family: 'Oranienbaum', serif;">Oranienbaum</option>
            <option value="Bellota Text" style="font-family: 'Bellota Text', cursive;">Bellota Text</option>
            <option value="Jura" style="font-family: 'Jura', sans-serif;">Jura (техно)</option>
            <option value="Podkova" style="font-family: 'Podkova', serif;">Podkova</option>
            <option value="Kurale" style="font-family: 'Kurale', serif;">Kurale</option>
            <option value="Yeseva One" style="font-family: 'Yeseva One', serif;">Yeseva One</option>
            <option value="Ruslan Display" style="font-family: 'Ruslan Display', cursive;">Ruslan Display (древнерусский)</option>
            <option value="Seymour One" style="font-family: 'Seymour One', sans-serif;">Seymour One</option>
            <option value="Cormorant Infant" style="font-family: 'Cormorant Infant', serif;">Cormorant Infant</option>
            <option value="Didact Gothic" style="font-family: 'Didact Gothic', sans-serif;">Didact Gothic</option>
            <option value="IBM Plex Sans" style="font-family: 'IBM Plex Sans', sans-serif;">IBM Plex Sans</option>
            <option value="Pangolin" style="font-family: 'Pangolin', cursive;">Pangolin</option>
            <option value="Stalinist One" style="font-family: 'Stalinist One', cursive;">Stalinist One</option>
          </select>
        </div>

        <div class="panel-row">
          <label>Форматирование:</label>
          <div class="checkbox-group">
            <label><input type="checkbox" id="chk-italic"> Курсив</label>
            <label><input type="checkbox" id="chk-bold"> Жирный</label>
            <label><input type="checkbox" id="chk-uppercase"> Все заглавные</label>
          </div>
        </div>

        <div class="panel-row">
          <label for="size-slider">Размер шрифта: <span id="size-val">24px</span></label>
          <input type="range" id="size-slider" min="12" max="48" step="1" value="24">
        </div>

        <div class="panel-row">
          <label for="shadow-slider">Размытие тени: <span id="shadow-val">1px</span></label>
          <input type="range" id="shadow-slider" min="0" max="8" step="1" value="1">
        </div>

        <div class="panel-row">
          <label for="speed-slider">Скорость вращения: <span id="speed-val">0.04</span></label>
          <input type="range" id="speed-slider" min="0.01" max="0.10" step="0.01" value="0.04">
        </div>

        <div class="panel-row">
          <label for="depth-slider">3D Глубина: <span id="depth-val">0.8</span></label>
          <input type="range" id="depth-slider" min="0.1" max="1.0" step="0.1" value="0.8">
        </div>

        <div class="panel-row">
          <label for="color-picker">Цвет слов:</label>
          <input type="color" id="color-picker" value="#4B8BCC">
        </div>

        <div class="panel-actions">
          <button id="save-btn" class="btn-primary">Сохранить</button>
          <button id="reset-btn" class="btn-secondary">Сбросить</button>
        </div>
      </div>
      </div>
    </div>
    <script src="/tagcanvas.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
